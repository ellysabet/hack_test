<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 나침반 - 감정 기반 선택 도우미</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4A90E2;
      --bg-color: #F4F7FC;
      --card-bg: #FFFFFF;
      --text-main: #333333;
      --text-muted: #777777;
    }
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 24px;
      color: var(--primary-color);
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 18px;
      color: var(--text-main);
      margin-top: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #E0E5EC;
      padding-bottom: 8px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #E0E5EC;
      border-radius: 8px;
      font-family: 'Pretendard', sans-serif;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: #357ABD;
    }

    button:active {
      transform: scale(0.98);
    }

    #loading {
      display: none;
      text-align: center;
      color: var(--primary-color);
      font-weight: 600;
      margin-top: 20px;
    }

    #result-section {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    .result-choice {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px dashed #E0E5EC;
    }

    .result-reason {
      line-height: 1.6;
      font-size: 15px;
    }

    /* 게시판 영역 스타일 */
    #opinion-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opinion-item {
      background: #F9FAFC;
      border: 1px solid #E0E5EC;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .opinion-item .author {
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
      font-size: 13px;
    }
    
    .opinion-item .date {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: normal;
      margin-left: 8px;
    }

    .opinion-item .content {
      color: var(--text-main);
      margin-top: 4px;
      white-space: pre-wrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 입력 섹션 (나침반) -->
    <div class="card">
      <h1>마음 나침반 🧭</h1>
      
      <div class="input-group">
        <label>선택지 A</label>
        <input type="text" id="optionA" placeholder="예: 오늘 밤새서 작업하기">
      </div>
      
      <div class="input-group">
        <label>선택지 B</label>
        <input type="text" id="optionB" placeholder="예: 일단 푹 자고 내일 아침에 하기">
      </div>
      
      <div class="input-group">
        <label>지금 나의 감정 / 상황</label>
        <textarea id="emotion" placeholder="예: 몸이 너무 피곤하고 지쳐서 의욕이 안 나. 하지만 기한이 얼마 안 남아서 불안해."></textarea>
      </div>

      <button id="submitBtn">어느 쪽이 좋을까요?</button>
      <div id="loading">마음을 읽으며 고민하는 중... 💭</div>
    </div>

    <!-- 출력 섹션 -->
    <div class="card" id="result-section">
      <div class="result-choice" id="resultChoice"></div>
      <div class="result-reason" id="resultReason"></div>
    </div>
    
    <!-- 사용자 의견 입력 섹션 추가 -->
    <div class="card">
      <h2>의견 남기기 ✍️</h2>
      <div class="input-group">
        <label>닉네임 (선택)</label>
        <input type="text" id="userName" placeholder="예: 익명">
      </div>
      <div class="input-group">
        <label>앱 사용 후기 및 바라는 점</label>
        <textarea id="userOpinion" placeholder="자유롭게 의견을 남겨주세요!"></textarea>
      </div>
      <button id="submitOpinionBtn">의견 등록하기</button>
    </div>

    <!-- 게시판(사용자 의견) 섹션 -->
    <div class="card" id="opinion-board-section">
      <h2>사용자 의견 게시판 💬</h2>
      <div id="opinion-list">
        <!-- Firestore 데이터가 여기에 들어옵니다 -->
      </div>
    </div>
  </div>

  <!-- Firebase 연동 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxpt2bUhwbbVzdHSqcVqssYkfAXHGdRKE",
      authDomain: "hacktest2-d7818.firebaseapp.com",
      projectId: "hacktest2-d7818",
      storageBucket: "hacktest2-d7818.firebasestorage.app",
      messagingSenderId: "209123022156",
      appId: "1:209123022156:web:feff81d569beb23d562be9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result-section');
    const opinionList = document.getElementById('opinion-list');
    const submitOpinionBtn = document.getElementById('submitOpinionBtn');

    // 게시판(사용자 의견) 불러오기 함수
    async function loadOpinions() {
      opinionList.innerHTML = '<div style="text-align:center; color:#777;">의견을 불러오는 중...</div>';
      try {
        const q = query(collection(db, "opinions"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        opinionList.innerHTML = '';
        
        if(querySnapshot.empty) {
          opinionList.innerHTML = '<div style="text-align:center; color:#777;">아직 등록된 의견이 없습니다. 첫 번째 의견을 남겨주세요!</div>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = 'opinion-item';
          
          // 시간 포맷팅
          let dateString = '';
          if(data.createdAt) {
            const date = data.createdAt.toDate();
            dateString = `${date.getFullYear()}.${date.getMonth()+1}.${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
          }

          div.innerHTML = `
            <div class="author">${data.name || '익명'} <span class="date">${dateString}</span></div>
            <div class="content">${data.text}</div>
          `;
          opinionList.appendChild(div);
        });
      } catch (error) {
        console.error("Firebase 데이터 불러오기 에러:", error);
        opinionList.innerHTML = '<div style="text-align:center; color:red;">의견을 불러오지 못했습니다.</div>';
      }
    }

    // 페이지 접속 시 의견 게시판 데이터 불러오기
    loadOpinions();

    // 의견 등록 버튼 이벤트
    submitOpinionBtn.addEventListener('click', async () => {
      let name = document.getElementById('userName').value.trim();
      const text = document.getElementById('userOpinion').value.trim();

      if (!text) {
        alert("의견 내용을 입력해주세요!");
        return;
      }
      
      if (!name) name = "익명";

      submitOpinionBtn.disabled = true;
      submitOpinionBtn.innerText = '등록 중...';

      try {
        await addDoc(collection(db, "opinions"), {
          name: name,
          text: text,
          createdAt: serverTimestamp()
        });

        document.getElementById('userName').value = '';
        document.getElementById('userOpinion').value = '';
        
        alert("의견이 등록되었습니다. 감사합니다!");
        await loadOpinions(); // 게시판 새로고침

      } catch (error) {
        alert("의견 등록 중 오류가 발생했습니다.");
        console.error(error);
      } finally {
        submitOpinionBtn.disabled = false;
        submitOpinionBtn.innerText = '의견 등록하기';
      }
    });

    // 기존 결과 확인(Gemini API 호출) 버튼 이벤트
    btn.addEventListener('click', async () => {
      const optionA = document.getElementById('optionA').value.trim();
      const optionB = document.getElementById('optionB').value.trim();
      const emotion = document.getElementById('emotion').value.trim();

      if (!optionA || !optionB || !emotion) {
        alert("선택지와 감정을 모두 입력해주세요!");
        return;
      }

      btn.style.display = 'none';
      resultSection.style.display = 'none';
      loading.style.display = 'block';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ optionA, optionB, emotion })
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'API 호출 실패');
        }
        
        document.getElementById('resultChoice').innerText = `✨ 추천: ${data.choice}`;
        document.getElementById('resultReason').innerText = data.reason;
        resultSection.style.display = 'block';

      } catch (error) {
        alert("처리 중 오류가 발생했습니다. 콘솔을 확인해주세요.");
        console.error(error);
      } finally {
        loading.style.display = 'none';
        btn.style.display = 'block';
        btn.innerText = '새로운 고민 물어보기';
      }
    });
  </script>
</body>
</html>
