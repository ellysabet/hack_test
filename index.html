<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 나침반 - 감정 기반 선택 도우미</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4A90E2;
      --bg-color: #F4F7FC;
      --card-bg: #FFFFFF;
      --text-main: #333333;
      --text-muted: #777777;
    }
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 24px;
      color: var(--primary-color);
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 18px;
      color: var(--text-main);
      margin-top: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #E0E5EC;
      padding-bottom: 8px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #E0E5EC;
      border-radius: 8px;
      font-family: 'Pretendard', sans-serif;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: #357ABD;
    }

    button:active {
      transform: scale(0.98);
    }

    #loading {
      display: none;
      text-align: center;
      color: var(--primary-color);
      font-weight: 600;
      margin-top: 20px;
    }

    #result-section {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    .result-choice {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px dashed #E0E5EC;
    }

    .result-reason {
      line-height: 1.6;
      font-size: 15px;
    }

    /* 게시판(히스토리) 영역 스타일 추가 */
    #history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: #F9FAFC;
      border: 1px solid #E0E5EC;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .history-item .options {
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .history-item .choice {
      color: var(--primary-color);
      font-weight: bold;
      margin-top: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 입력 섹션 -->
    <div class="card">
      <h1>마음 나침반 🧭</h1>
      
      <div class="input-group">
        <label>선택지 A</label>
        <input type="text" id="optionA" placeholder="예: 오늘 밤새서 작업하기">
      </div>
      
      <div class="input-group">
        <label>선택지 B</label>
        <input type="text" id="optionB" placeholder="예: 일단 푹 자고 내일 아침에 하기">
      </div>
      
      <div class="input-group">
        <label>지금 나의 감정 / 상황</label>
        <textarea id="emotion" placeholder="예: 몸이 너무 피곤하고 지쳐서 의욕이 안 나. 하지만 기한이 얼마 안 남아서 불안해."></textarea>
      </div>

      <button id="submitBtn">어느 쪽이 좋을까요?</button>
      <div id="loading">마음을 읽으며 고민하는 중... 💭</div>
    </div>

    <!-- 출력 섹션 -->
    <div class="card" id="result-section">
      <div class="result-choice" id="resultChoice"></div>
      <div class="result-reason" id="resultReason"></div>
    </div>

    <!-- 게시판(기록) 섹션 추가 -->
    <div class="card" id="history-section">
      <h2>지난 고민 기록 📝</h2>
      <div id="history-list">
        <!-- Firestore 데이터가 여기에 들어옵니다 -->
      </div>
    </div>
  </div>

  <!-- Firebase 연동을 위해 type="module" 적용 -->
  <script type="module">
    // Firebase SDK v9+ 가져오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 입력해주신 firebaseConfig 적용
    const firebaseConfig = {
      apiKey: "AIzaSyCxpt2bUhwbbVzdHSqcVqssYkfAXHGdRKE",
      authDomain: "hacktest2-d7818.firebaseapp.com",
      projectId: "hacktest2-d7818",
      storageBucket: "hacktest2-d7818.firebasestorage.app",
      messagingSenderId: "209123022156",
      appId: "1:209123022156:web:feff81d569beb23d562be9"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM 요소
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result-section');
    const historyList = document.getElementById('history-list');

    // 게시판(기록) 불러오기 함수
    async function loadHistory() {
      historyList.innerHTML = '<div style="text-align:center; color:#777;">기록을 불러오는 중...</div>';
      try {
        // 최신순(내림차순) 정렬 쿼리 생성
        const q = query(collection(db, "decisions"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        historyList.innerHTML = '';
        
        if(querySnapshot.empty) {
          historyList.innerHTML = '<div style="text-align:center; color:#777;">아직 고민 기록이 없습니다.</div>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
            <div class="options">🤔 A: ${data.optionA} vs B: ${data.optionB}</div>
            <div class="choice">✨ 선택: ${data.choice}</div>
          `;
          historyList.appendChild(div);
        });
      } catch (error) {
        console.error("Firebase 데이터 불러오기 에러:", error);
        historyList.innerHTML = '<div style="text-align:center; color:red;">기록을 불러오지 못했습니다. Firestore 규칙을 확인해주세요.</div>';
      }
    }

    // 페이지 접속 시 기존 데이터 불러오기
    loadHistory();

    // 등록(결과 확인) 버튼 이벤트
    btn.addEventListener('click', async () => {
      const optionA = document.getElementById('optionA').value.trim();
      const optionB = document.getElementById('optionB').value.trim();
      const emotion = document.getElementById('emotion').value.trim();

      if (!optionA || !optionB || !emotion) {
        alert("선택지와 감정을 모두 입력해주세요!");
        return;
      }

      btn.style.display = 'none';
      resultSection.style.display = 'none';
      loading.style.display = 'block';

      try {
        // 기존 1번, 2번 규칙 유지 (서버리스 API 호출)
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ optionA, optionB, emotion })
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'API 호출 실패');
        }
        
        // 화면에 결과 렌더링
        document.getElementById('resultChoice').innerText = `✨ 추천: ${data.choice}`;
        document.getElementById('resultReason').innerText = data.reason;
        resultSection.style.display = 'block';

        // Firebase에 결과 저장하기
        await addDoc(collection(db, "decisions"), {
          optionA: optionA,
          optionB: optionB,
          emotion: emotion,
          choice: data.choice,
          reason: data.reason,
          createdAt: serverTimestamp() // 최신순 정렬을 위한 타임스탬프
        });

        // 저장 후 게시판 최신화
        await loadHistory();

        // 입력창 초기화
        document.getElementById('optionA').value = '';
        document.getElementById('optionB').value = '';
        document.getElementById('emotion').value = '';

      } catch (error) {
        alert("처리 중 오류가 발생했습니다. 콘솔을 확인해주세요.");
        console.error(error);
      } finally {
        loading.style.display = 'none';
        btn.style.display = 'block';
        btn.innerText = '새로운 고민 물어보기';
      }
    });
  </script>
</body>
</html>
